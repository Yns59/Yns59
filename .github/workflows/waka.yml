name: Waka Readme
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with WakaTime stats
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          TIME_RANGE: last_7_days
          SHOW_TIME: true
          SHOW_TOTAL: true
          LANG_COUNT: 8
          IGNORED_LANGUAGES: |
            HTML
            CSS
            JSON
            Markdown
            YAML
            Bash
            Text
            .env
            Git Config
            XML
            Dockerfile
            TOML
            INI
            Other
